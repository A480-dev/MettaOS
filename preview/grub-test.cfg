set default=0
set timeout=30

# Resolucion fija 16:9 — evita estirar splash 4K en framebuffer 4:3
set gfxmode=1920x1080
set gfxpayload=keep

loadfont unicode
insmod all_video
insmod gfxterm
insmod gfxterm_background
insmod png
terminal_output gfxterm

set theme=$prefix/theme.txt
export theme

function metta_preview_notice {
  set color_normal=light-gray/black
  set color_highlight=black/light-green
  terminal_output console
  echo ""
  echo "  ========================================================="
  echo "   METTA OS -- vista previa del menu GRUB (solo tema)"
  echo ""
  echo "   Esta imagen de prueba NO contiene kernel ni initrd."
  echo "   No puede arrancar el sistema operativo completo."
  echo ""
  echo "   Para boot real de la ISO:"
  echo "     ./test-iso.sh images/metta-os-1.0-amd64.iso"
  echo ""
  echo "   Para compilar la ISO:"
  echo "     ./scripts/ci-build.sh"
  echo "  ========================================================="
  echo ""
  echo "  Volviendo al menu en 12 s (cualquier tecla = volver ya)..."
  sleep --interruptible 12
  terminal_output gfxterm
  normal
}

menuentry "Live system (METTA OS)" --class metta {
  metta_preview_notice
}

menuentry "Live system (fail-safe)" --class metta {
  metta_preview_notice
}

menuentry "Reboot / Shutdown" --class reboot {
  reboot
}
