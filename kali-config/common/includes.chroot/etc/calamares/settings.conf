# METTA OS — Calamares installer configuration
# Syntax is YAML 1.2
---
modules-search: [ local, /usr/lib/calamares/modules ]

oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false
prompt-install: false
dont-chroot: false

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary

- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - grubcfg
  - bootloader
  - metta-sources-final
  - packages
  - initramfs
  - metta-postinstall
  - umount

- show:
  - finished

branding: metta
